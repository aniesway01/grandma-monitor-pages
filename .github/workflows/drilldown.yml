name: Drill-Down

on:
  workflow_dispatch:
    inputs:
      camera:
        description: 'Camera (e.g. CH06)'
        required: true
        default: 'CH06'
        type: choice
        options: ['CH01', 'CH02', 'CH03', 'CH04', 'CH05', 'CH06']
      date:
        description: 'Date (YYYY-MM-DD)'
        required: true
        default: '2026-06-01'
      start:
        description: 'Start time (HH:MM)'
        required: true
        default: '12:45'
      end:
        description: 'End time (HH:MM)'
        required: true
        default: '12:50'

# P7: Only one drill-down at a time
concurrency:
  group: drilldown
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  drilldown:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # P5: generous timeout for slow DVR

    steps:
      - name: Checkout pages repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Write Google Drive token
        # P4: Token from secret, written to temp file
        run: echo '${{ secrets.GDRIVE_TOKEN }}' > gdrive_token.json

      - name: Verify drilldown script
        run: python -c "import ast; ast.parse(open('drilldown_ci.py').read()); print('drilldown_ci.py: OK')"

      - name: Run drill-down
        env:
          DVR_HOST: ${{ secrets.DVR_HOST }}
          DVR_PORT: ${{ secrets.DVR_PORT || '2401' }}
          DVR_USER: ${{ secrets.DVR_USER }}
          DVR_PASSWORD: ${{ secrets.DVR_PASSWORD }}
          FFMPEG_ENCODER: copy
        run: |
          python drilldown_ci.py \
            --camera "${{ inputs.camera }}" \
            --date "${{ inputs.date }}" \
            --start "${{ inputs.start }}" \
            --end "${{ inputs.end }}" \
            --token-path gdrive_token.json \
            --output-dir output

      - name: Deploy gallery to Pages
        run: |
          # Copy gallery HTML to repo root
          cp output/drilldown_*.html . 2>/dev/null || true

          # Update drilldown index
          python -c "
          import json, os
          from pathlib import Path
          meta_path = Path('output/drilldown_result.json')
          if not meta_path.exists():
              exit(1)
          meta = json.loads(meta_path.read_text())

          # Append to index
          index_path = Path('drilldown_index.json')
          index = json.loads(index_path.read_text()) if index_path.exists() else []
          index.append(meta)
          index_path.write_text(json.dumps(index, indent=2))
          print(f'Index updated: {len(index)} entries')
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "drill-down: ${{ inputs.camera }} ${{ inputs.date }} ${{ inputs.start }}-${{ inputs.end }}"
          git push

      - name: Report failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Drill-down failed: ${{ inputs.camera }} ${{ inputs.date }} ${{ inputs.start }}-${{ inputs.end }}`,
              body: `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['drill-down-failure']
            });
