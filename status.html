<!doctype html><html><head><meta charset=utf-8>
<title>GrandMa Worker Status</title><meta name=viewport content="width=device-width,initial-scale=1">
<meta http-equiv=refresh content=60>
<style>
body{font:14px system-ui,sans-serif;background:#0f1117;color:#e6e6e6;margin:0;padding:16px}
h1{font-size:18px;margin:0 0 2px} .sub{color:#8a92a6;font-size:12px;margin-bottom:14px}
.grid{display:flex;flex-wrap:wrap;gap:4px;margin:10px 0}
.cell{width:78px;padding:4px 6px;border-radius:4px;font-size:11px;text-align:center;background:#1a2030}
.done{background:#1b5e20;color:#a5d6a7} .pending{background:#263042;color:#8a92a6}
.overwritten{background:#2a2a2a;color:#666} .err{background:#7f1d1d;color:#fca5a5}
.stat{display:inline-block;margin-right:14px;font-size:13px}
.b{font-weight:700;color:#90caf9}
pre{background:#0a0c12;padding:10px;border-radius:6px;overflow:auto;max-height:300px;font-size:12px;color:#9fb3c8}
</style></head><body>
<h1>GrandMa Worker Status</h1>
<div class=sub id=meta>loading status.json…</div>
<div id=stats></div>
<div class=grid id=grid></div>
<h3 style=font-size:14px>Recent log</h3><pre id=log>…</pre>
<script>
fetch('status.json?'+Date.now()).then(r=>r.json()).then(s=>{
  const dates=s.progress||{};
  const counts={};Object.values(dates).forEach(v=>counts[v]=(counts[v]||0)+1);
  document.getElementById('meta').textContent =
    'updated '+(s.updated||'?')+' · worker pid '+((s.worker||{}).pid||'—')+
    ' · '+((s.worker||{}).alive?'RUNNING':'stopped')+
    (s.resources?(' · RAM '+(s.resources.ram_free_mb||'?')+'MB free · disk '+(s.resources.disk_free_gb||'?')+'GB'):'');
  document.getElementById('stats').innerHTML =
    Object.entries(counts).map(([k,v])=>'<span class=stat><span class=b>'+v+'</span> '+k+'</span>').join('');
  document.getElementById('grid').innerHTML =
    Object.entries(dates).map(([d,st])=>{
      const c={done:'done',pending:'pending',overwritten:'overwritten'}[st]||'err';
      return '<div class="cell '+c+'">'+d.slice(5)+'<br>'+st.slice(0,8)+'</div>';
    }).join('');
  document.getElementById('log').textContent=(s.log_tail||[]).join('\n')||'(no log)';
}).catch(e=>{document.getElementById('meta').textContent='status.json load error: '+e;});
</script></body></html>
